spring:
  datasource:
    url: jdbc:h2:mem:library_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

security:
  jwt:
    secret: ZGV2c2VjcmV0LXRlc3Qtc2VjcmV0LWRldnNlY3JldC10ZXN0LXNlY3JldA==
    expiration-ms: 3600000
  cors:
    allowed-origins: http://localhost:3000
  require-https: false
